<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Off Peak Surf Bali</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #E8E4DC;
      --cream-light: #F3F0EA;
      --charcoal: #2C2927;
      --charcoal-light: #4A4642;
      --highlight: #C8714A;
      --highlight-light: rgba(200,113,74,0.12);
      --green: #5BAD7F;
      --red: #C8534A;
      --white: #FFFFFF;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream-light);
      color: var(--charcoal);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      background: var(--cream);
      border-radius: var(--radius);
      padding: 2.5rem;
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(44,41,39,0.08);
      box-shadow: 0 4px 32px rgba(44,41,39,0.08);
    }

    .login-logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .login-sub {
      text-align: center;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--highlight);
      font-weight: 700;
      margin-bottom: 2rem;
    }

    .login-form label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--charcoal-light);
      margin-bottom: 0.4rem;
    }

    .login-form input {
      width: 100%;
      background: var(--cream-light);
      border: 1px solid rgba(44,41,39,0.12);
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    .login-form input:focus { border-color: var(--highlight); }

    .login-error {
      background: rgba(200,83,74,0.1);
      border: 1px solid rgba(200,83,74,0.3);
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.82rem;
      color: var(--red);
      margin-bottom: 1rem;
      display: none;
    }
    .login-error.visible { display: block; }

    .btn {
      width: 100%;
      background: var(--charcoal);
      color: var(--cream);
      border: none;
      border-radius: 100px;
      padding: 0.85rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--highlight); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── ADMIN HEADER ── */
    #adminScreen { display: none; }

    .admin-header {
      background: var(--charcoal);
      color: var(--cream);
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .admin-header h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: 0.05em;
    }
    .admin-header h1 .sub {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--highlight);
      font-weight: 700;
      margin-left: 0.5rem;
    }
    .logout-btn {
      background: transparent;
      color: rgba(232,228,220,0.7);
      border: 1px solid rgba(232,228,220,0.2);
      border-radius: 100px;
      padding: 0.5rem 1.1rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(232,228,220,0.1); color: var(--cream); }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--cream);
      border-radius: var(--radius);
      padding: 1.25rem;
      border: 1px solid rgba(44,41,39,0.07);
    }
    .stat-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--charcoal-light);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      line-height: 1;
    }
    .stat-card.revenue .stat-value { color: var(--highlight); }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--cream);
      border: 1px solid rgba(44,41,39,0.1);
      border-radius: 100px;
      padding: 0.45rem 1rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--charcoal-light);
    }
    .filter-btn:hover { color: var(--charcoal); border-color: rgba(44,41,39,0.25); }
    .filter-btn.active { background: var(--charcoal); color: var(--cream); border-color: var(--charcoal); }

    /* ── BOOKINGS LIST ── */
    .bookings-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--charcoal-light);
      font-size: 0.9rem;
    }

    .booking-card {
      background: var(--cream);
      border-radius: var(--radius);
      border: 1px solid rgba(44,41,39,0.07);
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }
    .booking-card:hover { box-shadow: 0 4px 20px rgba(44,41,39,0.06); }
    .booking-card.cancelled { opacity: 0.55; }
    .booking-card.cancelled .booking-when { text-decoration: line-through; }

    .booking-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .booking-when {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
    }
    .booking-when .time { color: var(--highlight); }
    .booking-when .date-sub {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--charcoal-light);
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    .booking-total {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--highlight);
    }
    .booking-status {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25rem 0.7rem;
      border-radius: 100px;
      margin-left: 0.5rem;
    }
    .booking-status.confirmed { background: rgba(91,173,127,0.15); color: var(--green); }
    .booking-status.cancelled { background: rgba(200,83,74,0.15); color: var(--red); }

    .booking-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      padding: 1rem 0;
      border-top: 1px solid rgba(44,41,39,0.08);
      border-bottom: 1px solid rgba(44,41,39,0.08);
    }

    .detail-block .detail-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--charcoal-light);
      margin-bottom: 0.3rem;
    }
    .detail-block .detail-value {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.5;
    }
    .detail-block .detail-value a {
      color: var(--highlight);
      text-decoration: none;
    }
    .detail-block .detail-value a:hover { text-decoration: underline; }

    .booking-message {
      background: var(--cream-light);
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      font-size: 0.85rem;
      line-height: 1.6;
      margin: 1rem 0;
      color: var(--charcoal-light);
      font-style: italic;
    }

    .booking-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .action-btn {
      padding: 0.5rem 1rem;
      border-radius: 100px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid transparent;
    }
    .action-btn.whatsapp {
      background: rgba(91,173,127,0.12);
      color: var(--green);
      border-color: rgba(91,173,127,0.3);
    }
    .action-btn.whatsapp:hover { background: var(--green); color: white; }
    .action-btn.email {
      background: var(--cream-light);
      color: var(--charcoal);
      border-color: rgba(44,41,39,0.15);
    }
    .action-btn.email:hover { background: var(--charcoal); color: var(--cream); }
    .action-btn.cancel {
      background: rgba(200,83,74,0.08);
      color: var(--red);
      border-color: rgba(200,83,74,0.3);
      margin-left: auto;
      border-style: solid;
      border-width: 1px;
      background-color: rgba(200,83,74,0.08);
    }
    .action-btn.cancel:hover { background: var(--red); color: white; }
    .action-btn.restore {
      background: rgba(91,173,127,0.08);
      color: var(--green);
      border-color: rgba(91,173,127,0.3);
      margin-left: auto;
    }
    .action-btn.restore:hover { background: var(--green); color: white; }

    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--charcoal-light);
      font-size: 0.9rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .booking-details { grid-template-columns: 1fr; }
      main { padding: 1.5rem 1rem; }
      .admin-header { padding: 1rem 1.25rem; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
      .stat-card { padding: 1rem; }
      .stat-value { font-size: 1.4rem; }
      .booking-card { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- ════════════ LOGIN SCREEN ════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <p class="login-sub">Off Peak Surf Bali</p>
    <p class="login-logo">Admin Access</p>
    <form id="loginForm" class="login-form">
      <label>Password</label>
      <input id="passwordInput" type="password" placeholder="Enter admin password" required autocomplete="current-password">
      <div class="login-error" id="loginError">Incorrect password. Try again.</div>
      <button type="submit" class="btn" id="loginBtn">Log in</button>
    </form>
  </div>
</div>

<!-- ════════════ ADMIN SCREEN ════════════ -->
<div id="adminScreen">
  <div class="admin-header">
    <h1>Off Peak <span class="sub">Admin Dashboard</span></h1>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </div>

  <main>
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-value" id="statToday">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Week</div>
        <div class="stat-value" id="statWeek">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Month</div>
        <div class="stat-value" id="statMonth">—</div>
      </div>
      <div class="stat-card revenue">
        <div class="stat-label">Revenue (Month)</div>
        <div class="stat-value" id="statRevenue">—</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="upcoming">Upcoming</button>
      <button class="filter-btn" data-filter="today">Today</button>
      <button class="filter-btn" data-filter="week">This Week</button>
      <button class="filter-btn" data-filter="all">All</button>
      <button class="filter-btn" data-filter="cancelled">Cancelled</button>
    </div>

    <!-- Bookings -->
    <div id="bookingsList">
      <div class="loading">Loading bookings…</div>
    </div>
  </main>
</div>

<!-- ════════════ JAVASCRIPT ════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCg9EWEURliCmSdQ9MD8_7oA8WmVaMlqUU",
  authDomain: "offpeakbali.firebaseapp.com",
  projectId: "offpeakbali",
  storageBucket: "offpeakbali.firebasestorage.app",
  messagingSenderId: "1067115128830",
  appId: "1:1067115128830:web:2b8ba0ae04ba8c16ffc2af"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const PACKAGE_NAMES = {
  beginner:     'Beginner',
  intermediate: 'Intermediate',
  advanced:     'Advanced',
};
const ADDON_NAMES = {
  photos:    '📷 Photos',
  video:     '🎥 Video',
  bundle:    '📷🎥 Photos + Video',
  transport: '🛺 Transport',
};

const fmtIDR = (n) => 'Rp ' + Number(n||0).toLocaleString('de-DE');

// ── AUTH ─────────────────────────────────────────────────────
const SESSION_KEY = 'offpeak_admin_authed';

function isAuthed() {
  return sessionStorage.getItem(SESSION_KEY) === 'yes';
}

function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  startBookingsListener();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminScreen').style.display = 'none';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('passwordInput').value;
  const errBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errBox.classList.remove('visible');
  btn.disabled = true;
  btn.textContent = 'Checking…';

  try {
    const r = await fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    if (r.ok) {
      sessionStorage.setItem(SESSION_KEY, 'yes');
      showAdmin();
    } else {
      errBox.classList.add('visible');
    }
  } catch (err) {
    console.error(err);
    errBox.textContent = 'Network error. Please try again.';
    errBox.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log in';
    document.getElementById('passwordInput').value = '';
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
});

// ── BOOKINGS DATA ────────────────────────────────────────────
let allBookings = [];
let currentFilter = 'upcoming';

function startBookingsListener() {
  const q = query(collection(db, 'bookings'), orderBy('date', 'asc'));
  onSnapshot(q, (snap) => {
    allBookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderStats();
    renderBookings();
  }, (err) => {
    console.error('Firestore error:', err);
    document.getElementById('bookingsList').innerHTML =
      '<div class="bookings-empty">Couldn\'t load bookings. Check your connection.</div>';
  });
}

// ── FILTERING ────────────────────────────────────────────────
function todayKey() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}
function startOfWeek() {
  const t = new Date();
  const day = t.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const monday = new Date(t.getFullYear(), t.getMonth(), t.getDate() + diff);
  return monday;
}
function endOfWeek() {
  const m = startOfWeek();
  return new Date(m.getFullYear(), m.getMonth(), m.getDate() + 7);
}
function ymd(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function filterBookings(filter) {
  const today = todayKey();
  const weekStart = ymd(startOfWeek());
  const weekEnd   = ymd(endOfWeek());

  return allBookings.filter(b => {
    if (filter === 'cancelled') return b.status === 'cancelled';
    if (b.status === 'cancelled') return false;
    if (filter === 'all')      return true;
    if (filter === 'upcoming') return b.date >= today;
    if (filter === 'today')    return b.date === today;
    if (filter === 'week')     return b.date >= weekStart && b.date < weekEnd;
    return true;
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderBookings();
  });
});

// ── STATS ────────────────────────────────────────────────────
function renderStats() {
  const today = todayKey();
  const weekStart = ymd(startOfWeek());
  const weekEnd   = ymd(endOfWeek());
  const t = new Date();
  const monthPrefix = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`;

  const active = allBookings.filter(b => b.status !== 'cancelled');
  const todayCount = active.filter(b => b.date === today).length;
  const weekCount  = active.filter(b => b.date >= weekStart && b.date < weekEnd).length;
  const monthBookings = active.filter(b => b.date.startsWith(monthPrefix));
  const monthCount = monthBookings.length;
  const revenue    = monthBookings.reduce((s, b) => s + (b.totalAmount || 0), 0);

  document.getElementById('statToday').textContent   = todayCount;
  document.getElementById('statWeek').textContent    = weekCount;
  document.getElementById('statMonth').textContent   = monthCount;
  document.getElementById('statRevenue').textContent = fmtIDR(revenue);
}

// ── RENDER BOOKINGS ──────────────────────────────────────────
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
  }[c]));
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m-1, d);
  return date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

function whatsappLink(phone) {
  if (!phone) return null;
  const clean = phone.replace(/[^\d]/g, '');
  if (!clean) return null;
  return `https://wa.me/${clean}`;
}

function renderBookings() {
  const list = document.getElementById('bookingsList');
  const filtered = filterBookings(currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="bookings-empty">No bookings to show for this filter.</div>`;
    return;
  }

  list.innerHTML = filtered.map(b => {
    const isCancelled = b.status === 'cancelled';
    const addons = (b.addons || []).map(a => ADDON_NAMES[a] || a).join(', ') || '—';
    const wa = whatsappLink(b.customerPhone);

    return `
      <div class="booking-card ${isCancelled ? 'cancelled' : ''}">
        <div class="booking-top">
          <div class="booking-when">
            <span class="time">${escapeHtml(b.startTime)}</span> · ${escapeHtml(b.packageName || PACKAGE_NAMES[b.package] || b.package)}
            <span class="date-sub">${escapeHtml(formatDate(b.date))}</span>
          </div>
          <div>
            <span class="booking-total">${fmtIDR(b.totalAmount)}</span>
            <span class="booking-status ${isCancelled ? 'cancelled' : 'confirmed'}">${isCancelled ? 'Cancelled' : 'Confirmed'}</span>
          </div>
        </div>

        <div class="booking-details">
          <div class="detail-block">
            <div class="detail-label">Customer</div>
            <div class="detail-value">${escapeHtml(b.customerName || '—')}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">People</div>
            <div class="detail-value">${b.people || 1}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Email</div>
            <div class="detail-value">${b.customerEmail ? `<a href="mailto:${escapeHtml(b.customerEmail)}">${escapeHtml(b.customerEmail)}</a>` : '—'}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Phone</div>
            <div class="detail-value">${b.customerPhone ? escapeHtml(b.customerPhone) : '—'}</div>
          </div>
          <div class="detail-block" style="grid-column: span 2">
            <div class="detail-label">Add-ons</div>
            <div class="detail-value">${escapeHtml(addons)}</div>
          </div>
        </div>

        ${b.message ? `<div class="booking-message">"${escapeHtml(b.message)}"</div>` : ''}

        <div class="booking-actions">
          ${wa ? `<a href="${wa}" target="_blank" rel="noopener" class="action-btn whatsapp">💬 WhatsApp</a>` : ''}
          ${b.customerEmail ? `<a href="mailto:${escapeHtml(b.customerEmail)}" class="action-btn email">✉ Email</a>` : ''}
          ${isCancelled
            ? `<button class="action-btn restore" data-id="${b.id}" data-action="restore">↩ Restore</button>`
            : `<button class="action-btn cancel" data-id="${b.id}" data-action="cancel">✗ Cancel Booking</button>`}
        </div>
      </div>`;
  }).join('');

  // Wire up action buttons
  list.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.id));
  });
}

// ── ACTIONS ──────────────────────────────────────────────────
async function handleAction(action, id) {
  const newStatus = action === 'cancel' ? 'cancelled' : 'confirmed';
  const verb = action === 'cancel' ? 'cancel' : 'restore';

  if (!confirm(`Are you sure you want to ${verb} this booking?`)) return;

  try {
    await updateDoc(doc(db, 'bookings', id), { status: newStatus });
    // No need to re-render — onSnapshot will trigger it automatically
  } catch (err) {
    console.error(err);
    alert(`Failed to ${verb} booking. Try again.`);
  }
}

// ── INIT ─────────────────────────────────────────────────────
if (isAuthed()) {
  showAdmin();
} else {
  showLogin();
}
</script>
</body>
</html>
